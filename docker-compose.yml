version: "3.9"

services:
  web:
    build: .
    restart: unless-stopped
    command: ["budgify-web", "--db", "/data/budgify.db", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      BUDGIFY_PASSWORD_FILE: /app/password.txt
      BUDGIFY_PASSWORD_KEY: ${BUDGIFY_PASSWORD_KEY:?Set BUDGIFY_PASSWORD_KEY}
    ports:
      - "8000:8000"
    volumes:
      - budgify-data:/data
      - ./config.yaml:/app/config.yaml:ro
      - ./password.txt:/app/password.txt:ro

  sync:
    build: .
    restart: unless-stopped
    command: ["python", "scripts/watch_statements.py"]
    environment:
      STATEMENTS_DIR: /statements
      DB_PATH: /data/budgify.db
      CONFIG_PATH: /app/config.yaml
      OUTPUT_FORMAT: ${OUTPUT_FORMAT:-csv}
      POLL_SECONDS: ${POLL_SECONDS:-10}
    volumes:
      - budgify-data:/data
      - ${STATEMENTS_HOST_DIR:-./statements}:/statements:ro
      - ${CONFIG_PATH:-./config.yaml}:/app/config.yaml:ro

  auction-web:
    build:
      context: ./self-learn/auction_search_tool
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["python", "app.py", "serve", "--port", "5001"]
    ports:
      - "5001:5001"
    volumes:
      - auction-data:/app/data

  auction-indexer:
    build:
      context: ./self-learn/auction_search_tool
      dockerfile: Dockerfile
    restart: unless-stopped
    command:
      [
        "sh",
        "-c",
        "while true; do echo \"[$$(date -Iseconds)] index start\"; python -u app.py index; echo \"[$$(date -Iseconds)] index sleep $${INDEX_INTERVAL:-21600}s\"; sleep \"$${INDEX_INTERVAL:-21600}\"; done",
      ]
    environment:
      INDEX_INTERVAL: ${AUCTION_INDEX_INTERVAL:-21600}
    volumes:
      - auction-data:/app/data

volumes:
  budgify-data:
  auction-data:
