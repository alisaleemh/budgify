name: Deploy Budgify

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      mode:
        description: "Run a safe smoke test or a real deploy"
        required: true
        default: test
        type: choice
        options:
          - test
          - deploy

jobs:
  deploy:
    runs-on: [self-hosted, homelab, docker-compose, budgify]
    timeout-minutes: 30
    env:
      APP_DIR: /srv/budgify
      DEPLOY_FLAG: /srv/budgify/.deploy-enabled
      DEPLOY_MODE: ${{ inputs.mode }}
      BUDGIFY_COMPOSE_FILE: /opt/apps/docker-compose.yml
      BUDGIFY_COMPOSE_ENV_FILE: /opt/apps/.env
      BUDGIFY_COMPOSE_SERVICES: budgify-web budgify-sync

    steps:
      - name: Smoke test
        run: |
          cd "$APP_DIR"
          whoami
          hostname
          docker version
          docker compose version
          read -r -a services <<< "$BUDGIFY_COMPOSE_SERVICES"
          docker compose --env-file "$BUDGIFY_COMPOSE_ENV_FILE" -f "$BUDGIFY_COMPOSE_FILE" config --quiet
          docker compose --env-file "$BUDGIFY_COMPOSE_ENV_FILE" -f "$BUDGIFY_COMPOSE_FILE" config "${services[@]}"

      - name: Decide whether to deploy
        id: gate
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && "${DEPLOY_MODE:-test}" == "deploy" ]]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$GITHUB_EVENT_NAME" == "push" && -f "$DEPLOY_FLAG" ]]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "deploy=false" >> "$GITHUB_OUTPUT"
          echo "Deployment skipped. Pushes to main require $DEPLOY_FLAG; workflow_dispatch mode=test stays safe."

      - name: Deploy
        if: steps.gate.outputs.deploy == 'true'
        run: |
          cd "$APP_DIR"
          git fetch origin main
          git reset --hard origin/main
          exec ./deploy.sh
